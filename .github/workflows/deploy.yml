name: Deploy Vault Rotation Function

on:
  push:
    branches: [ main ]
    paths:
      - 'src/HoneyDrunk.Vault.Rotation/**'
      - 'src/HoneyDrunk.Vault.Rotation.Abstractions/**'
      - 'src/HoneyDrunk.Vault.Rotation.Providers/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: 'staging'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Function App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore HoneyDrunk.Vault.Rotation.sln

      - name: Build
        run: dotnet build HoneyDrunk.Vault.Rotation.sln -c Release --no-restore

      - name: Test
        run: dotnet test HoneyDrunk.Vault.Rotation.sln -c Release --no-build

      - name: Publish
        run: |
          dotnet publish src/HoneyDrunk.Vault.Rotation/HoneyDrunk.Vault.Rotation.csproj \
            -c Release \
            -o ./publish \
            --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ./publish

  resolve:
    name: Resolve ${{ inputs.environment || 'staging' }} config
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    outputs:
      functions-app: ${{ vars.VAULT_ROTATION_FUNCTION_APP_NAME }}
      resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
      keyvault-name: ${{ vars.VAULT_ROTATION_KEYVAULT_NAME }}
    steps:
      - name: Export environment config
        run: |
          echo "Resolved config for environment: ${{ inputs.environment || 'staging' }}"
          echo "  Function App: ${{ vars.VAULT_ROTATION_FUNCTION_APP_NAME }}"
          echo "  Resource Group: ${{ vars.AZURE_RESOURCE_GROUP }}"
          echo "  Key Vault: ${{ vars.VAULT_ROTATION_KEYVAULT_NAME }}"

  deploy-gate:
    name: Rotation SLA Deploy Gate
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: SLA deploy gate placeholder
        run: |
          echo "Pending HoneyDrunk.Actions deploy-gate SLA check action."
          echo "Wire the actions-deploy-gate-sla-check packet here when it lands."

  deploy:
    name: Deploy to ${{ inputs.environment || 'staging' }}
    needs: [resolve, deploy-gate]
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/job-deploy-function.yml@main
    with:
      functions-app: ${{ needs.resolve.outputs.functions-app }}
      resource-group: ${{ needs.resolve.outputs.resource-group }}
      artifact-name: function-app
      package-path: ./publish
      keyvault-name: ${{ needs.resolve.outputs.keyvault-name }}
      keyvault-secrets: ''
    secrets:
      azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
      azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
      azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
