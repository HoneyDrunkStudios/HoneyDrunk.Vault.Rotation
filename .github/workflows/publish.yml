name: Publish Rotation Artifact

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish without v prefix, for example 0.1.0'
        required: true
        type: string

permissions: {}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      version: ${{ steps.version.outputs.version }}
      version-tag: ${{ steps.version.outputs.version-tag }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION_TAG="v${VERSION}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "version=$VERSION" >>"$GITHUB_OUTPUT"
          echo "version-tag=$VERSION_TAG" >>"$GITHUB_OUTPUT"

  release:
    name: Build, Test, and Publish App Artifact
    needs: prepare
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    uses: HoneyDrunkStudios/HoneyDrunk.Actions/.github/workflows/release.yml@main
    with:
      dotnet-version: '10.0.x'
      configuration: 'Release'
      runs-on: 'ubuntu-latest'
      working-directory: '.'
      project-path: 'HoneyDrunk.Vault.Rotation.slnx'
      package-version: ${{ needs.prepare.outputs.version }}
      enable-app-publish: true
      publish-projects: 'src/HoneyDrunk.Vault.Rotation/HoneyDrunk.Vault.Rotation.csproj'
      publish-self-contained: false
      publish-runtime: 'linux-x64'
      actions-ref: 'main'

  github-release:
    name: Create GitHub Release
    needs: [prepare, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version-tag }}
          name: HoneyDrunk.Vault.Rotation ${{ needs.prepare.outputs.version-tag }}
          body: |
            ## HoneyDrunk.Vault.Rotation ${{ needs.prepare.outputs.version-tag }}

            Tier 2 third-party secret rotation Function App for ADR-0006.
          draft: false
          prerelease: false
